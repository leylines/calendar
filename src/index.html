<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title><%= seo.title %></title>
    <meta name="description" content="<%= seo.description %>">
    <meta name="theme-color" content="<%= seo.themeColor %>">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="<%= seo.url %>">
    <meta property="og:title" content="<%= seo.title %>">
    <meta property="og:description" content="<%= seo.description %>">
    <meta property="og:image" content="<%= seo.image %>">
    
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="<%= seo.url %>">
    <meta property="twitter:title" content="<%= seo.title %>">
    <meta property="twitter:description" content="<%= seo.description %>">
    <meta property="twitter:image" content="<%= seo.image %>">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
        <%= JSON.stringify(seo.schema) %>
    </script>
</head>
<body>
    <div class="container mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center border-b border-[rgba(212,175,55,0.35)] pb-4 mb-8">
            <h1 class="text-3xl md:text-4xl text-center md:text-left mb-4 md:mb-0 heading-mystic">13-Monate Kalender</h1>
            <div class="controls flex flex-wrap justify-center gap-2 md:gap-4 w-full md:w-auto">
                <button id="todayBtn" class="mystic-btn">Heute</button>
                <button id="prevBtn" class="mystic-btn px-4">&lt;</button>
                <span id="currentPeriod" class="text-xl md:text-2xl min-w-[150px] md:min-w-[200px] text-center w-full md:w-auto order-first md:order-none mb-2 md:mb-0">Monat 1</span>
                <button id="nextBtn" class="mystic-btn px-4">&gt;</button>
                <div class="dropdown dropdown-end">
                    <div tabindex="0" role="button" class="mystic-btn" id="viewDropdownBtn">Monatsansicht <span class="ml-2 text-[0.6rem]">▼</span></div>
                    <ul tabindex="0" class="dropdown-content z-[1] menu p-1.5 mt-1 shadow-[0_0_15px_rgba(212,175,55,0.2)] bg-[#0a0a0a] border border-[rgba(212,175,55,0.35)] rounded-sm w-48 text-[var(--color-gold)] font-raleway font-light">
                        <li><a id="optMonth" class="hover:bg-[rgba(212,175,55,0.1)] active:bg-[var(--color-gold)] active:text-black rounded-sm py-2">Monatsansicht</a></li>
                        <li><a id="optWeek" class="hover:bg-[rgba(212,175,55,0.1)] active:bg-[var(--color-gold)] active:text-black rounded-sm py-2">Wochenansicht</a></li>
                        <li><a id="optDay" class="hover:bg-[rgba(212,175,55,0.1)] active:bg-[var(--color-gold)] active:text-black rounded-sm py-2">Tagesansicht</a></li>
                    </ul>
                </div>
            </div>
            <div class="file-upload mt-4 md:mt-0 flex gap-2">
                <button id="locationBtn" class="mystic-btn px-2" title="Standort für Sonnen-/Monddaten abrufen">📍 Standort</button>
                <label for="csvUpload" title="Eigene events.csv hochladen" class="mystic-upload-label">📁 CSV</label>
                <input type="file" id="csvUpload" accept=".csv" class="hidden">
            </div>
        </header>
        
        <main>
            <div id="weekdays" class="grid grid-cols-7 gap-1 md:gap-2 text-center font-medium mb-4 border-b border-[rgba(212,175,55,0.15)] pb-2 heading-mystic text-xs md:text-sm text-[rgba(212,175,55,0.8)] uppercase transition-all">
                <div>Montag</div><div>Dienstag</div><div>Mittwoch</div><div>Donnerstag</div><div>Freitag</div><div>Samstag</div><div>Sonntag</div>
            </div>
            <div id="calendarGrid" class="grid gap-1 md:gap-2 transition-all"></div>
        </main>
    </div>

    <dialog id="modal" class="modal backdrop-blur-sm">
        <div class="modal-box bg-[#0a0a0a] border border-[var(--color-gold)] shadow-[0_0_30px_rgba(212,175,55,0.15)] rounded-sm max-w-md text-[var(--color-gold)] font-raleway p-6 md:p-8">
            <form method="dialog">
                <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2 text-[var(--color-gold)] hover:bg-[rgba(212,175,55,0.1)] border-none text-lg">✕</button>
            </form>
            <h2 id="modalDate" class="heading-mystic text-xl md:text-2xl text-[var(--color-gold-light)] mb-1">Datum</h2>
            <p id="modalGregorian" class="italic text-[rgba(212,175,55,0.6)] mb-4 border-b border-[rgba(212,175,55,0.2)] pb-3 font-light text-sm md:text-base"></p>
            <div id="modalDetails" class="mb-5 font-light text-sm md:text-base space-y-1"></div>
            <h3 class="heading-mystic text-lg md:text-xl mb-2">Ereignisse</h3>
            <ul id="modalEvents" class="list-disc pl-5 font-light text-sm md:text-base space-y-1"></ul>
        </div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>
</body>
</html>
